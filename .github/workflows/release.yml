name: Build & Release YouCord

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Equicord renderer (standalone)
        run: pnpm buildStandalone

      - name: Package youcord-dist.zip
        shell: pwsh
        run: |
          $staging = "youcord-dist-staging"
          New-Item -ItemType Directory -Path $staging -Force | Out-Null

          if (Test-Path "dist\desktop") {
            Copy-Item "dist\desktop\*" "$staging\" -Recurse -Force
          } elseif (Test-Path "dist") {
            Copy-Item "dist\*" "$staging\" -Recurse -Force
          }

          if (Test-Path "ghost-server") {
            Copy-Item "ghost-server" "$staging\ghost-server" -Recurse
          }

          if (-not (Test-Path "$staging\patcher.js")) {
            Write-Error "BUILD ERROR: patcher.js missing from staging root"
            exit 1
          }

          Compress-Archive -Path "$staging\*" -DestinationPath "youcord-dist.zip" -Force
          Write-Host "youcord-dist.zip created ($($(Get-Item youcord-dist.zip).Length / 1MB) MB)"

      - name: Build YouCord Installer
        shell: pwsh
        run: |
          # Sync installer version with release tag
          $tag = "$env:GITHUB_REF" -replace '^refs/tags/v', ''
          $pkg = Get-Content "installer-src/package.json" -Raw | ConvertFrom-Json
          $pkg.version = $tag
          $pkg | ConvertTo-Json -Depth 10 | Set-Content "installer-src/package.json"
          Write-Host "Installer version set to $tag"

          Push-Location installer-src
          npm install --legacy-peer-deps
          npm run compile
          npx electron-builder --win -p never
          Pop-Location

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            youcord-dist.zip
            release/installer/YouCord-Installer.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
