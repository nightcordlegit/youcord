name: Build & Release Latest

on:
    push:
        branches:
            - main

env:
    FORCE_COLOR: true
    GH_TOKEN: ${{ github.token }}

permissions:
    contents: write

jobs:
    Build:
        name: Build YouCord
        runs-on: windows-latest

        steps:
            - uses: actions/checkout@v7

            - uses: pnpm/action-setup@v6

            - name: Use Node.js 22
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build standalone
              run: pnpm buildStandalone

            - name: Generate plugin lists
              run: |
                  pnpm generatePluginJson dist/plugins.json
                  pnpm generateEquicordPluginJson dist/equicordplugins.json
                  pnpm generateVencordPluginJson dist/vencordplugins.json
                  pnpm generateDevsList dist/devs.json

            - name: Package youcord-dist.zip
              shell: pwsh
              run: |
                  $staging = "youcord-dist-staging"
                  New-Item -ItemType Directory -Path $staging -Force | Out-Null

                  # Compiled files (patcher.js, renderer.js, preload.js, renderer.css)
                  if (Test-Path "dist\desktop") {
                      Copy-Item "dist\desktop\*" "$staging\" -Recurse -Force
                  }

                  # Ghost-server (voice/stream server)
                  if (Test-Path "ghost-server") {
                      Copy-Item "ghost-server" "$staging\ghost-server" -Recurse
                  }

                  # Sanity-check
                  if (-not (Test-Path "$staging\patcher.js")) {
                      Write-Error "BUILD ERROR: patcher.js missing from staging root"
                      exit 1
                  }

                  Compress-Archive -Path "$staging\*" -DestinationPath "youcord-dist.zip" -Force
                  Write-Host "youcord-dist.zip created ($($(Get-Item youcord-dist.zip).Length / 1MB) MB)"

            - name: Upload other build artifacts
              shell: pwsh
              run: |
                  $releaseDir = "dist\release"
                  New-Item -ItemType Directory -Path $releaseDir -Force | Out-Null

                  # Copy browser extension files
                  if (Test-Path "dist\browser\browser.*") {
                      Copy-Item "dist\browser\browser.*" $releaseDir
                  }
                  # Copy userscript
                  Get-ChildItem "dist\Equicord.user.*" -ErrorAction SilentlyContinue | Copy-Item -Destination $releaseDir
                  # Copy json/asar files
                  Get-ChildItem "dist\*.json","dist\*.asar","dist\*.zip" -ErrorAction SilentlyContinue | Copy-Item -Destination $releaseDir
                  # Copy desktop extras
                  Get-ChildItem "dist\desktop\*" -ErrorAction SilentlyContinue | Copy-Item -Destination $releaseDir

                  # Clean up empty files and package.json
                  Get-ChildItem $releaseDir -File | Where-Object { $_.Length -eq 0 } | Remove-Item
                  Remove-Item "$releaseDir\package.json" -ErrorAction SilentlyContinue
                  Remove-Item "$releaseDir\*.map" -ErrorAction SilentlyContinue

            - name: Create or update latest release
              shell: pwsh
              run: |
                  $tag = "latest"

                  # Try to create the release (fails silently if already exists)
                  gh release create $tag --title "Latest Build" --notes "Automated build from main branch ($env:GITHUB_SHA)" --latest=false 2>$null

                  # Upload artifacts (--clobber overwrites existing files)
                  gh release upload $tag --clobber "youcord-dist.zip"

                  if (Test-Path "dist\release") {
                      Get-ChildItem "dist\release\*" -File | ForEach-Object {
                          gh release upload $tag --clobber $_.FullName
                      }
                  }

    Build-Mac:
        name: Build YouCord (macOS)
        runs-on: macos-latest

        steps:
            - uses: actions/checkout@v7

            - uses: pnpm/action-setup@v6

            - name: Use Node.js 22
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build standalone
              run: pnpm buildStandalone

            - name: Generate plugin lists
              run: |
                  pnpm generatePluginJson dist/plugins.json
                  pnpm generateEquicordPluginJson dist/equicordplugins.json
                  pnpm generateVencordPluginJson dist/vencordplugins.json
                  pnpm generateDevsList dist/devs.json

            - name: Build desktop app & package .app/.dmg
              run: |
                  pnpm buildDesktop
                  npx electron-builder --config electron-builder.config.cjs --mac --publish never

            - name: Create or update latest release
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  tag="latest"
                  gh release create $tag --title "Latest Build" --notes "Automated build from main branch ($GITHUB_SHA)" --latest=false 2>/dev/null || true
                  for f in release/*.dmg release/*.zip release/*.app.tar.gz; do
                      [ -f "$f" ] && gh release upload $tag --clobber "$f"
                  done
